name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel any in-flight CI run on the same ref when a new push lands.
# Without this, queued runs pile up (visible during the 2026-05-23
# bring-up where four runs queued in sequence after rapid fixes).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast PR gate — runs the TS verify chain alone. Keeps PR feedback
  # under 30s on typical changes. Chain: tsc → eslint → prettier --check
  # → vitest → vite build → verify-dist.
  ts-verify:
    name: pnpm verify (fast PR gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      # Version pin lives in package.json's "packageManager" field
      # (pnpm@10.12.1). action-setup reads it automatically.
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm verify

  # Full release gate via haggis-eval. Runs the orchestrator's `all`
  # subcommand which composes 15 gate subcommands (24 individual checks) sequentially:
  # rust (cargo fmt+clippy+test), rust-cov (llvm-cov lines=100% fns=100%),
  # ts (tsc+vitest+build), coverage
  # (vitest v8 thresholds: lines=100% stmts=100% fns=100% branches=100%),
  # security (deploy-config.test — headers+CSP+cache), perf (bundle
  # budgets + W3C paint-timing FCP/LCP/DCL via Playwright), browser
  # (chromium: 5 smokes incl. a11y), multi-browser (firefox + webkit:
  # 4 core smokes, a11y excluded — tab-focus behaviour is OS-dependent),
  # determinism
  # (same-seed state-hash equality across two runs), visual (aHash
  # diff vs tests/golden/ with Hamming tolerance), a11y (26 WCAG 2.2
  # AA spot-checks, hand-rolled, no axe-core dep), soak (15s RAF loop
  # heap-growth < 5 MB), supply-chain (cargo deny: licenses + RustSec
  # advisories + source policy; cargo machete: unused deps; gitleaks:
  # secret scan; osv-scanner: cross-ecosystem CVE scan),
  # differential hash (C vs Rust FNV-1a,
  # 100k+ cases), differential rng (WAT vs Rust xoshiro128**, 100k+
  # cases). Emits signed JSON report to target/haggis-eval/all-*.json.
  haggis-eval-all:
    name: haggis-eval all (release gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - name: Install gitleaks
        uses: taiki-e/install-action@v2
        with:
          tool: gitleaks
      - name: Install osv-scanner
        uses: google/osv-scanner-action/osv-installer@v2
      - uses: actions/setup-go@v6
        with:
          go-version: '1.24'
          # haggis-eval is stdlib-only, so there's no go.sum to key the
          # module cache on. Disable cache to silence the "Dependencies
          # file is not found" warning.
          cache: false
      - run: pnpm install --frozen-lockfile
      # Playwright browser needed by `browser` smoke gate.
      - run: pnpm exec playwright install --with-deps chromium firefox webkit
      - name: Lint and test haggis-eval
        working-directory: tools/haggis-eval
        run: |
          gofmt -l . | tee /tmp/gofmt_out.txt
          if [ -s /tmp/gofmt_out.txt ]; then echo "gofmt: files need formatting" && exit 1; fi
          go vet ./...
          go test ./... -timeout 120s
      - name: Build haggis-eval
        working-directory: tools/haggis-eval
        run: go build .
      - name: Run release gate
        run: ./tools/haggis-eval/haggis-eval all
      - name: Upload signed report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: haggis-eval-report
          path: target/haggis-eval/
          if-no-files-found: warn
