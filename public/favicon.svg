<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="ha.ggis — a wild haggis">
  <!--
    ha.ggis favicon — 32×32 canonical silhouette.
    Palette from DESIGN.md. Haggis faces right (toward WHS door).
    Layering: background → tail → body → face → mane → snout → eye → legs.
    Canon: low oval body, mane dome on face-side, single eye peeking
    below fringe, snout protruding forward, tail tuft on back end.
  -->
  <rect width="32" height="32" fill="#24170f"/>
  <!-- Tail tuft: cream-tan circle at back-left end -->
  <circle cx="5" cy="19" r="2" fill="#c4a878"/>
  <!-- Body ink outline ring -->
  <ellipse cx="14" cy="20" rx="11" ry="5.5" fill="#1a0e08"/>
  <!-- Body ginger-brown fill -->
  <ellipse cx="14" cy="20" rx="10" ry="4.5" fill="#6a3a18"/>
  <!-- Face skin: dark protrusion at right end of body -->
  <ellipse cx="24" cy="20" rx="3" ry="3.5" fill="#0a0604"/>
  <!-- Mane mass: large dome on face-side (right) -->
  <ellipse cx="20" cy="14" rx="7" ry="7" fill="#c4a878"/>
  <!-- Mane shadow under-layer for depth -->
  <ellipse cx="18" cy="16" rx="5" ry="5" fill="#8a6f4a"/>
  <!-- Mane crown cream highlight -->
  <ellipse cx="20" cy="11" rx="4" ry="2.5" fill="#f4d8a0"/>
  <!-- Snout: protrudes right past mane/face -->
  <ellipse cx="27" cy="21" rx="3" ry="2" fill="#3a2010"/>
  <!-- Eye: single, peeks below mane fringe -->
  <circle cx="23" cy="18" r="1" fill="#1a0e08"/>
  <!-- Four leg stubs: back pair left, front pair right -->
  <rect x="6" y="24" width="2" height="4" fill="#1a0e08"/>
  <rect x="10" y="24" width="2" height="4" fill="#1a0e08"/>
  <rect x="15" y="24" width="2" height="4" fill="#1a0e08"/>
  <rect x="19" y="24" width="2" height="4" fill="#1a0e08"/>
</svg>
