<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="ha.ggis — a folk-silhouette wild haggis with a tartan band">
  <!--
    ha.ggis favicon — 32×32 committed-folk-silhouette haggis. Matches
    the canon protagonist in src/render/bothy-haggis.ts. One body,
    one tartan band, two dot eyes, asymmetric legs. No fabric flaps,
    no thistle, no Minions-style eye construction.

    Background: deep peat-brown so the icon stands against light tabs.
    A 1px lighter rim on the bottom of the body keeps the silhouette
    visible against dark browser chrome.
  -->
  <rect width="32" height="32" fill="#24170f"/>

  <!-- Sack body — pear silhouette, one outline + one fill -->
  <ellipse cx="16" cy="19" rx="11" ry="10" fill="#1a0e08"/>
  <ellipse cx="16" cy="19" rx="10" ry="9"  fill="#5a3220"/>
  <!-- Subtle lit rim on the lower body for dark-mode silhouette safety -->
  <ellipse cx="16" cy="27.5" rx="9" ry="0.6" fill="#a06030" opacity="0.4"/>

  <!-- Tartan band — ONE wrap, cream base with red+green+red stripes -->
  <ellipse cx="16" cy="9.6" rx="7" ry="1.4" fill="#3a1410"/>
  <ellipse cx="16" cy="9.2" rx="7" ry="1.1" fill="#f4d8a0"/>
  <ellipse cx="13.55" cy="9.2" rx="1.4" ry="1.0" fill="#9c2018"/>
  <ellipse cx="16"    cy="9.2" rx="1.4" ry="1.0" fill="#1f4628"/>
  <ellipse cx="18.45" cy="9.2" rx="1.4" ry="1.0" fill="#9c2018"/>

  <!-- Two tiny ribbon-end twists above the band — bow tails -->
  <path d="M 14.5,8 Q 13,5.5 14.5,5.5 L 15,8 Z" fill="#9c2018"/>
  <path d="M 17,8 Q 19,5.5 17.5,5.5 L 17.5,8 Z" fill="#1f4628"/>

  <!-- Eyes — TWO BLACK DOTS -->
  <circle cx="12" cy="17" r="1.6" fill="#0a0604"/>
  <circle cx="20" cy="17" r="1.6" fill="#0a0604"/>

  <!-- Asymmetric drift legs — LEFT pair long, RIGHT pair short -->
  <rect x="10" y="27" width="1.6" height="3.5" fill="#1a0e08"/>
  <rect x="13.4" y="27" width="1.6" height="3.5" fill="#1a0e08"/>
  <rect x="17"   y="28.5" width="1.6" height="2" fill="#1a0e08"/>
  <rect x="20.4" y="28.5" width="1.6" height="2" fill="#1a0e08"/>
</svg>
