<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="ha.ggis — a tied wild haggis with a tartan band">
  <!--
    ha.ggis favicon — 32×32 tied-pudding haggis with a tartan
    Highland tell. Matches the canon protagonist in
    src/render/bothy-haggis.ts. At favicon scale the tartan band
    (red + cream + green stripes) is the one feature that carries
    cultural identity, so it gets the focal contrast.

    Background: deep peat-brown so the icon stands against light tabs.
    A 1px lighter rim on the bottom of the body keeps the silhouette
    visible against dark browser chrome.
  -->
  <rect width="32" height="32" fill="#24170f"/>

  <!-- Sack body — round with a hint of pear -->
  <ellipse cx="16" cy="19" rx="11" ry="10" fill="#1a0e08"/>
  <ellipse cx="16" cy="19" rx="10" ry="9"  fill="#6a4528"/>
  <!-- Subtle lit rim on the lower body for dark-mode silhouette safety -->
  <ellipse cx="16" cy="27.5" rx="9" ry="0.6" fill="#a06030" opacity="0.4"/>

  <!-- Dawn-lit upper crown -->
  <ellipse cx="16" cy="13" rx="7" ry="2.5" fill="#a06030" opacity="0.55"/>

  <!-- Small drooping fabric flaps — drawn BEFORE tartan band -->
  <path d="M 13,8 Q 10,7 9,8.5 Q 11,9 14,9 Z" fill="#6a4528"/>
  <path d="M 19,8 Q 22,7 23,8.5 Q 21,9 18,9 Z" fill="#6a4528"/>

  <!-- TARTAN cord wraps — two stacked bands with visible red+green
       stripes on a cream base. This is the Highland identity tell. -->
  <!-- Wrap 1 (upper) — red-primary -->
  <ellipse cx="16" cy="8.6" rx="7" ry="1.3" fill="#3a1410"/>
  <ellipse cx="16" cy="8.2" rx="7" ry="1.1" fill="#f4d8a0"/>
  <ellipse cx="13.55" cy="8.2" rx="1.4" ry="1.0" fill="#9c2018"/>
  <ellipse cx="16"    cy="8.2" rx="1.4" ry="1.0" fill="#9c2018"/>
  <ellipse cx="18.45" cy="8.2" rx="1.4" ry="1.0" fill="#9c2018"/>
  <!-- Wrap 2 (lower) — green-primary -->
  <ellipse cx="16" cy="11"   rx="6.5" ry="1.3" fill="#3a1410"/>
  <ellipse cx="16" cy="10.6" rx="6.5" ry="1.1" fill="#f4d8a0"/>
  <ellipse cx="13.7" cy="10.6" rx="1.3" ry="1.0" fill="#1f4628"/>
  <ellipse cx="16"   cy="10.6" rx="1.3" ry="1.0" fill="#1f4628"/>
  <ellipse cx="18.3" cy="10.6" rx="1.3" ry="1.0" fill="#1f4628"/>

  <!-- Tiny THISTLE sprig at the front-right of the cinch — purple
       flower head + green stem. Iconic Scottish flower. -->
  <line x1="20" y1="9.5" x2="21" y2="7.5" stroke="#3a5a30" stroke-width="0.5" stroke-linecap="round"/>
  <circle cx="21" cy="7" r="0.9" fill="#7a4a9c"/>
  <circle cx="21" cy="6.5" r="0.4" fill="#c46abc"/>

  <!-- Eyes — two small forward-facing dots -->
  <circle cx="12" cy="17" r="2"   fill="#1a0e08"/>
  <ellipse cx="12" cy="17" rx="1.4" ry="1.4" fill="#f0e6c8"/>
  <circle cx="12" cy="17" r="0.7" fill="#0a0604"/>
  <circle cx="11.7" cy="16.6" r="0.4" fill="#fff0c8"/>

  <circle cx="20" cy="17" r="2"   fill="#1a0e08"/>
  <ellipse cx="20" cy="17" rx="1.4" ry="1.4" fill="#f0e6c8"/>
  <circle cx="20" cy="17" r="0.7" fill="#0a0604"/>
  <circle cx="20.3" cy="16.6" r="0.4" fill="#fff0c8"/>

  <!-- Snout — small dark dot below eyes -->
  <ellipse cx="16" cy="21" rx="2" ry="1.3" fill="#1a0e08"/>
  <circle cx="16" cy="20.5" r="0.5" fill="#5a3220"/>

  <!-- Smile — wider arc for legibility -->
  <path d="M 13.5,22.2 Q 16,23.4 18.5,22.2"
        stroke="#0a0604" stroke-width="0.9" stroke-linecap="round"
        fill="none"/>

  <!-- Asymmetric drift legs — LEFT pair long (3px), RIGHT pair short
       (1.5px). Exaggerated so the canon-gag reads even at 16×16. -->
  <rect x="10" y="27" width="1.6" height="3.5" fill="#1a0e08"/>
  <rect x="13.4" y="27" width="1.6" height="3.5" fill="#1a0e08"/>
  <rect x="17"   y="28.5" width="1.6" height="2" fill="#1a0e08"/>
  <rect x="20.4" y="28.5" width="1.6" height="2" fill="#1a0e08"/>
</svg>
