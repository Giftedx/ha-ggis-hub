<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="ha.ggis — The Wee Chieftain haggis icon">
  <!--
    ha.ggis favicon - close-cropped Wee Chieftain mark. This is not the
    full in-game mascot: at 32px the food cue wins through the oval
    casing, cream eyes, pale oat cutaway, and tied-end knot.
  -->
  <rect width="32" height="32" fill="#24170f"/>

  <!-- Whole haggis casing, cropped larger than the in-game pose -->
  <ellipse cx="15.6" cy="17.2" rx="14" ry="9.8" fill="#1a0e08"/>
  <ellipse cx="15.2" cy="16.7" rx="12.1" ry="7.9" fill="#7a3f24"/>
  <ellipse cx="11.8" cy="14.6" rx="7.4" ry="3.7" fill="#9c5630" opacity="0.72"/>
  <ellipse cx="19.2" cy="20.9" rx="7.6" ry="2.4" fill="#3a1e12" opacity="0.48"/>
  <ellipse cx="10.7" cy="10.8" rx="5.4" ry="1.2" fill="#b46a38" opacity="0.68"/>
  <ellipse cx="15.8" cy="24.5" rx="10.6" ry="1.2" fill="#3a1e12" opacity="0.52"/>

  <!-- Casing tension and tied-end knot -->
  <ellipse cx="4.8" cy="17.4" rx="1.1" ry="4.9" fill="#2a1408" opacity="0.48"/>
  <ellipse cx="26.2" cy="17.9" rx="1.3" ry="5.1" fill="#2a1408" opacity="0.55"/>
  <ellipse cx="27.5" cy="19.8" rx="1.55" ry="2.25" fill="#1a0e08"/>
