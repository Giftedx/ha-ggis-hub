  <rect x="25.15" y="16.1" width="0.7" height="6.2" fill="#5a3a20" opacity="0.92"/>
  <rect x="26.45" y="16.8" width="0.58" height="4.8" fill="#c4a878" opacity="0.95"/>
  <circle cx="25.9" cy="17.8" r="0.66" fill="#c4a878" opacity="0.96"/>
  <circle cx="28.0" cy="18.9" r="0.72" fill="#5a3a20" opacity="0.86"/>
  <circle cx="28.0" cy="18.9" r="0.42" fill="#c4a878" opacity="0.78"/>
  <path d="M 26.6,17.8 Q 27.8,17.2 28.8,19.2" fill="none" stroke="#c4a878" stroke-width="0.5" stroke-linecap="round" opacity="0.82"/>

  <!-- Pale oat cutaway and a few casing flecks -->
  <path d="M 3.9,13.7 Q 5.8,12.2 9.7,13.4 Q 11.0,15.1 10.0,16.8 Q 7.8,18.0 4.9,16.9 Q 3.1,15.5 3.9,13.7" fill="#2a1408" opacity="0.62"/>
  <path d="M 4.4,14.1 Q 7.0,12.9 9.6,14.1 Q 10.0,15.8 8.9,16.6 Q 6.9,17.3 4.8,16.2 Q 3.8,15.0 4.4,14.1" fill="#f4d8a0"/>
  <circle cx="5.8" cy="14.1" r="0.52" fill="#3a2a1a" opacity="0.62"/>
  <circle cx="8.0" cy="15.4" r="0.62" fill="#d8b46a" opacity="0.95"/>
  <circle cx="9.0" cy="14.5" r="0.48" fill="#d8b46a" opacity="0.82"/>
  <circle cx="10.5" cy="21.4" r="0.45" fill="#d8b46a" opacity="0.72"/>
  <circle cx="21.6" cy="15" r="0.45" fill="#d8b46a" opacity="0.76"/>
  <circle cx="20.4" cy="22.3" r="0.38" fill="#d8b46a" opacity="0.68"/>

