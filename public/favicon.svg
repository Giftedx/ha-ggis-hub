<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="ha.ggis — a tied wild haggis">
  <!--
    ha.ggis favicon — 32×32 tied-pudding haggis. Matches the canon
    protagonist in src/render/bothy-haggis.ts. At favicon scale the
    tied top (cream twine + fabric ears) is the only feature that
    really reads, so it carries the silhouette.

    Background: deep peat-brown so the icon stands against light tabs.
  -->
  <rect width="32" height="32" fill="#24170f"/>

  <!-- Sack body — round with a hint of pear (taller at bottom).
       Outline ring for crisp silhouette at small sizes. -->
  <ellipse cx="16" cy="19" rx="11" ry="10" fill="#1a0e08"/>
  <ellipse cx="16" cy="19" rx="10" ry="9"  fill="#6a4528"/>

  <!-- Dawn-lit upper crown -->
  <ellipse cx="16" cy="13" rx="7" ry="2.5" fill="#a06030" opacity="0.55"/>

  <!-- Fabric ears — drawn BEFORE twine so the cord overlaps them -->
  <path d="M 12,7 Q 8,4 7,7 Q 9,8 13,8 Z" fill="#6a4528"/>
  <path d="M 20,7 Q 24,4 25,7 Q 23,8 19,8 Z" fill="#6a4528"/>

  <!-- Twine wraps — two stacked cream cords at the cinch -->
  <ellipse cx="16" cy="9"  rx="7" ry="1.3" fill="#6a4a30"/>
  <ellipse cx="16" cy="8.5" rx="7" ry="1.1" fill="#c4a878"/>
  <ellipse cx="16" cy="8.2" rx="3" ry="0.5" fill="#f4d8a0" opacity="0.7"/>
  <ellipse cx="16" cy="10.7" rx="6.5" ry="1.1" fill="#6a4a30"/>
  <ellipse cx="16" cy="10.4" rx="6.5" ry="0.9" fill="#c4a878"/>

  <!-- Eyes — two small forward-facing dots -->
  <circle cx="12" cy="17" r="2"   fill="#1a0e08"/>
  <ellipse cx="12" cy="17" rx="1.4" ry="1.4" fill="#f0e6c8"/>
  <circle cx="12" cy="17" r="0.7" fill="#0a0604"/>
  <circle cx="11.7" cy="16.6" r="0.4" fill="#fff0c8"/>

  <circle cx="20" cy="17" r="2"   fill="#1a0e08"/>
  <ellipse cx="20" cy="17" rx="1.4" ry="1.4" fill="#f0e6c8"/>
  <circle cx="20" cy="17" r="0.7" fill="#0a0604"/>
  <circle cx="20.3" cy="16.6" r="0.4" fill="#fff0c8"/>

  <!-- Snout — small dark dot below eyes -->
  <ellipse cx="16" cy="21" rx="2" ry="1.3" fill="#1a0e08"/>
  <circle cx="16" cy="20.5" r="0.5" fill="#5a3220"/>

  <!-- Asymmetric drift legs — LEFT pair long, RIGHT pair short -->
  <rect x="10" y="27" width="1.6" height="3" fill="#1a0e08"/>
  <rect x="13.4" y="27" width="1.6" height="3" fill="#1a0e08"/>
  <rect x="17"   y="28" width="1.6" height="2" fill="#1a0e08"/>
  <rect x="20.4" y="28" width="1.6" height="2" fill="#1a0e08"/>
</svg>
