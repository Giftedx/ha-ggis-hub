<?xml version="1.0" encoding="UTF-8"?>
<!--
  ha.ggis hub — Open Graph social card.
  Size: 1200×630 (1.91:1, the platform-recommended OG aspect).
  Tokens: DESIGN.md (ink-deep, peat-brown, tatties-cream, oat-tan,
          neeps-orange, dawn-pink, heather-purple, whisky-amber).
  Also serves as visual direction for the future haggis sprite
  rebuild — the silhouette is canonical: low oval, cream mane drape
  cascading past body outline, black face skin, forward snout, eyes
  hidden by mane.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="ha.ggis hub — ha + ggis = haggis. A wee front door for highland games.">
  <title>ha.ggis hub</title>
  <desc>A wild haggis silhouette beside the title 'ha + ggis = haggis'. Warm peat-brown bothy at dawn.</desc>

  <defs>
    <!-- Background: peat-brown with a soft dawn glow in upper-right -->
    <radialGradient id="dawn" cx="80%" cy="0%" r="80%">
      <stop offset="0%"   stop-color="#f4c8b8" stop-opacity="0.32"/>
      <stop offset="30%"  stop-color="#7a4a9c" stop-opacity="0.18"/>
      <stop offset="70%"  stop-color="#3a2418" stop-opacity="0"/>
    </radialGradient>

    <!-- Warm vignette to focus reading -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="72%">
      <stop offset="60%" stop-color="#1a0e08" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0a0604" stop-opacity="0.65"/>
    </radialGradient>

    <!-- Haggis body gradient: ginger-brown belly to peat-dark back -->
    <linearGradient id="haggisBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#3a2418"/>
      <stop offset="55%" stop-color="#5a3220"/>
      <stop offset="100%" stop-color="#2a1408"/>
    </linearGradient>

    <!-- Mane gradient: cream highlight to oat-tan body -->
    <linearGradient id="mane" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#f4d8a0"/>
      <stop offset="45%" stop-color="#c4a878"/>
      <stop offset="100%" stop-color="#8a6f4a"/>
    </linearGradient>

    <!-- Mane rim catching dawn light -->
    <linearGradient id="rim" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#fff0c8" stop-opacity="0.85"/>
      <stop offset="40%" stop-color="#f4d8a0" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#f4d8a0" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Backdrop -->
  <rect x="0" y="0" width="1200" height="630" fill="#1a0e08"/>
  <rect x="0" y="0" width="1200" height="630" fill="url(#dawn)"/>

  <!-- Title block (left half) -->
  <g font-family="'Old Standard TT', 'IM Fell English', Cormorant Garamond, Georgia, 'Iowan Old Style', 'Apple Garamond', Baskerville, 'Times New Roman', serif" fill="#f0e6c8">
    <!-- The joke, big -->
    <text x="80" y="260" font-size="92" font-weight="400" letter-spacing="-1.5">ha<tspan fill="#e4a020">.</tspan>ggis</text>

    <!-- Equation underline + punchline -->
    <text x="80" y="320" font-size="36" font-style="italic" fill="#c4a878">ha + ggis = haggis</text>

    <!-- Tagline -->
    <text x="80" y="395" font-size="28" font-weight="400" fill="#f0e6c8">A wee front door for</text>
    <text x="80" y="430" font-size="28" font-weight="400" fill="#f0e6c8">a family of Highland games.</text>

    <!-- URL footer + Scots invite -->
    <text x="80" y="555" font-size="22" font-style="italic" fill="#8a6f4a">awa' in →</text>
    <text x="80" y="590" font-size="20" font-weight="600" fill="#c8842a">ha.ggis.xyz</text>
  </g>

  <!-- Haggis silhouette — v2 per canon refs (refs/wild-haggis-1.jpg,
       refs/wild-haggis-kelvingrove-cropped.jpg). Body is the dominant
       mass (60%); mane is asymmetric (cascades from back/top down over
       the FACE-SIDE of the body, not over the whole animal); body fur
       visible on back half; tiny leg stubs at all four corners; tail
       tuft. -->
  <g transform="translate(820 350)">
    <!-- Heather patch under the haggis -->
    <ellipse cx="120" cy="160" rx="180" ry="12" fill="#28182c" opacity="0.6"/>
    <ellipse cx="60"  cy="164" rx="6" ry="4" fill="#7a4a9c" opacity="0.85"/>
    <ellipse cx="100" cy="167" rx="5" ry="3" fill="#9c6abc" opacity="0.85"/>
    <ellipse cx="160" cy="165" rx="7" ry="4" fill="#7a4a9c" opacity="0.85"/>
    <ellipse cx="210" cy="164" rx="5" ry="3" fill="#9c6abc" opacity="0.85"/>
    <ellipse cx="40"  cy="166" rx="4" ry="3" fill="#9c6abc" opacity="0.7"/>

    <!-- Leg stubs — drawn FIRST so body covers their tops -->
    <rect x="40"  y="125" width="10" height="22" rx="3" fill="#1a0e08"/>
    <rect x="90"  y="128" width="10" height="22" rx="3" fill="#1a0e08"/>
    <rect x="180" y="128" width="10" height="22" rx="3" fill="#1a0e08"/>
    <rect x="240" y="125" width="10" height="22" rx="3" fill="#1a0e08"/>

    <!-- Tail tuft — peeks out the back -->
    <ellipse cx="285" cy="105" rx="14" ry="14" fill="#3a2418"/>
    <path d="M 280 110 Q 296 100 308 88 Q 308 96 302 108 Z" fill="#5a3220"/>
    <path d="M 285 120 Q 305 118 315 110 Q 312 122 296 128 Z" fill="#3a2418"/>

    <!-- Body — LOW OVAL, dominant mass. Ginger-brown, clearly visible.
         3.5:1 width-to-height per canon (low slung, wider than tall). -->
    <ellipse cx="145" cy="105" rx="135" ry="40" fill="url(#haggisBody)"/>

    <!-- Body fur texture — short strokes across the visible back half
         (right side). Suggests fur without overworking. -->
    <g stroke="#1a0e08" stroke-width="1" stroke-linecap="round" opacity="0.55">
      <line x1="180" y1="80" x2="184" y2="86"/>
      <line x1="195" y1="78" x2="200" y2="84"/>
      <line x1="210" y1="80" x2="214" y2="86"/>
      <line x1="225" y1="83" x2="229" y2="89"/>
      <line x1="240" y1="87" x2="244" y2="93"/>
      <line x1="255" y1="92" x2="258" y2="98"/>
      <line x1="190" y1="105" x2="194" y2="111"/>
      <line x1="215" y1="108" x2="219" y2="114"/>
      <line x1="240" y1="112" x2="244" y2="118"/>
    </g>

    <!-- Belly highlight — warm ginger underbelly catching dawn light -->
    <ellipse cx="170" cy="125" rx="100" ry="14" fill="#8a5a30" opacity="0.55"/>

    <!-- Mane mass — ASYMMETRIC. Drapes from top-back of body down OVER
         the face side (left). Mane occupies the FRONT half of the
         silhouette only. Body fur shows on the BACK half. -->
    <path d="M 30 80
             Q 30 50 70 45
             Q 110 42 140 50
             Q 160 55 165 85
             Q 165 115 155 135
             Q 145 150 130 152
             Q 110 154 95 148
             Q 80 152 65 148
             Q 45 145 30 130
             Q 18 110 30 85 Z"
          fill="url(#mane)"/>

    <!-- Mane STRANDS cascading down past body outline — irregular
         tips break the silhouette (the canon's defining feature). -->
    <path d="M 30 110 L 22 165 L 30 168 L 36 130 Z" fill="#8a6f4a"/>
    <path d="M 45 118 L 42 170 L 50 172 L 52 138 Z" fill="#c4a878"/>
    <path d="M 65 122 L 68 170 L 74 168 L 72 140 Z" fill="#a08868"/>
    <path d="M 90 125 L 96 165 L 102 163 L 98 140 Z" fill="#8a6f4a"/>
    <path d="M 115 130 L 122 160 L 128 158 L 122 142 Z" fill="#c4a878"/>
    <path d="M 140 135 L 148 158 L 152 156 L 148 144 Z" fill="#a08868"/>

    <!-- Cream highlight on the mane crown — brightest cluster on
         the haggis (eye-guidance: protagonist is brightest mass). -->
    <path d="M 50 50 Q 90 38 130 48 Q 150 53 158 65 Q 140 50 110 48 Q 80 48 55 58 Z" fill="url(#rim)"/>

    <!-- Face — black skin, small ellipse poking forward at the left
         end of body. Mostly visible (mane drape sweeps OVER the top
         and PAST the face, but face itself stays visible). -->
    <ellipse cx="20" cy="108" rx="30" ry="24" fill="#0a0604"/>
    <ellipse cx="18" cy="112" rx="24" ry="18" fill="#1a0e08"/>

    <!-- Snout protruding forward from the face plane -->
    <ellipse cx="-8" cy="118" rx="16" ry="10" fill="#2a1408"/>
    <ellipse cx="-12" cy="121" rx="10" ry="7" fill="#5a3a30"/>
    <!-- Nostril -->
    <ellipse cx="-14" cy="119" rx="2" ry="2.5" fill="#0a0604"/>

    <!-- Eyes — tiny dark dots, the canon "deep-set, often hidden by
         hair". One eye visible, the other behind mane fringe. -->
    <circle cx="28" cy="102" r="2.2" fill="#0a0604"/>
    <!-- Catchlight — alive -->
    <circle cx="28.5" cy="101" r="0.7" fill="#f4d8a0"/>

    <!-- Ear — small triangle poking through the mane top -->
    <path d="M 80 38 L 90 50 L 72 50 Z" fill="#3a2418"/>
    <path d="M 82 42 L 86 48 L 76 48 Z" fill="#5a3220"/>
  </g>

  <!-- Vignette over everything -->
  <rect x="0" y="0" width="1200" height="630" fill="url(#vignette)" pointer-events="none"/>

  <!-- Hairline frame -->
  <rect x="6" y="6" width="1188" height="618" fill="none" stroke="#5a3a20" stroke-width="1"/>
</svg>
