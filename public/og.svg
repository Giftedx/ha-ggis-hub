<?xml version="1.0" encoding="UTF-8"?>
<!--
  ha.ggis hub — Open Graph social card.
  Size: 1200×630 (1.91:1, the platform-recommended OG aspect).
  Tokens: DESIGN.md (ink-deep, peat-brown, tatties-cream, oat-tan,
          neeps-orange, dawn-pink, heather-purple, whisky-amber).
  Protagonist: The Wee Chieftain, the living whole-haggis mascot ported
  from `src/render/bothy-haggis.ts`. If you change the in-room haggis,
  port the changes here too — there is no auto-sync.

  Regenerate the PNG via `pnpm rasterize:og` after editing.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="ha.ggis hub — ha + ggis = haggis. A wee front door for highland games.">
  <title>ha.ggis hub</title>
  <desc>A living whole-haggis mascot with glossy casing, cream eyes, oat flecks, and tiny legs beside the title 'ha + ggis = haggis'. Warm peat-brown bothy at dawn.</desc>

  <defs>
    <!-- Background: peat-brown with a soft dawn glow in upper-right -->
    <radialGradient id="dawn" cx="80%" cy="0%" r="80%">
      <stop offset="0%"   stop-color="#f4c8b8" stop-opacity="0.32"/>
      <stop offset="30%"  stop-color="#7a4a9c" stop-opacity="0.18"/>
      <stop offset="70%"  stop-color="#3a2418" stop-opacity="0"/>
    </radialGradient>

    <!-- Warm vignette to focus reading -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="72%">
      <stop offset="60%" stop-color="#1a0e08" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0a0604" stop-opacity="0.65"/>
    </radialGradient>
  </defs>

  <!-- Backdrop -->
  <rect x="0" y="0" width="1200" height="630" fill="#1a0e08"/>
  <rect x="0" y="0" width="1200" height="630" fill="url(#dawn)"/>

  <!-- Title block (left half) -->
  <g font-family="'Old Standard TT', 'IM Fell English', Cormorant Garamond, Georgia, 'Iowan Old Style', 'Apple Garamond', Baskerville, 'Times New Roman', serif" fill="#f0e6c8">
    <!-- The joke, big -->
    <text x="80" y="260" font-size="92" font-weight="400" letter-spacing="-1.5">ha<tspan fill="#e4a020">.</tspan>ggis</text>

    <!-- Equation underline + punchline -->
    <text x="80" y="320" font-size="36" font-style="italic" fill="#c4a878">ha + ggis = haggis</text>

    <!-- Tagline -->
    <text x="80" y="395" font-size="28" font-weight="400" fill="#f0e6c8">A wee front door for</text>
    <text x="80" y="430" font-size="28" font-weight="400" fill="#f0e6c8">a family of Highland games.</text>

    <!-- URL footer + Scots invite -->
    <text x="80" y="555" font-size="22" font-style="italic" fill="#8a6f4a">awa' in →</text>
    <text x="80" y="590" font-size="20" font-weight="600" fill="#c8842a">ha.ggis.xyz</text>
  </g>

  <!-- The Wee Chieftain — living whole-haggis mascot, ported from
       bothy-haggis.ts. Food-shaped first: glossy casing, asymmetric
       tied end, oat patch, cream eyes, tiny uneven legs. -->
  <g transform="translate(900 330) scale(6)">

    <!-- Heather-purple ground patch -->
    <ellipse cx="0" cy="19" rx="34" ry="3.7" fill="#28182c" opacity="0.58"/>
    <circle cx="-12" cy="19.5" r="1.0" fill="#7a4a9c" opacity="0.72"/>
    <circle cx="11"  cy="20"   r="0.9" fill="#7a4a9c" opacity="0.58"/>

    <!-- Tiny asymmetric drift legs with rounded feet -->
    <g fill="#1a0e08">
      <rect x="-15.35" y="11" width="2.7" height="5.5"/>
      <rect x="-7.35"  y="11" width="2.7" height="5.5"/>
      <rect x="5.65"   y="11" width="2.7" height="3.8"/>
      <rect x="13.65"  y="11" width="2.7" height="3.8"/>
      <ellipse cx="-14" cy="18" rx="3.2" ry="1.1"/>
      <ellipse cx="-6" cy="18" rx="3.2" ry="1.1"/>
      <ellipse cx="7" cy="17.2" rx="2.7" ry="1"/>
      <ellipse cx="15" cy="17.2" rx="2.7" ry="1"/>
    </g>

    <!-- Whole haggis casing -->
    <ellipse cx="0" cy="1" rx="25" ry="15" fill="#1a0e08"/>
    <ellipse cx="0" cy="0" rx="22" ry="12.5" fill="#7a3f24"/>
    <ellipse cx="-5" cy="-3.5" rx="15" ry="7.5" fill="#9c5630" opacity="0.68"/>
    <ellipse cx="6" cy="7" rx="15" ry="4.2" fill="#3a1e12" opacity="0.5"/>
    <ellipse cx="-8" cy="-8" rx="9" ry="2.6" fill="#b46a38" opacity="0.58"/>
    <ellipse cx="0" cy="11.3" rx="20" ry="2.2" fill="#3a1e12" opacity="0.55"/>
    <ellipse cx="-20.8" cy="1.8" rx="2.1" ry="6.2" fill="#2a1408" opacity="0.42"/>
    <ellipse cx="21.2" cy="1.6" rx="2.4" ry="6.8" fill="#2a1408" opacity="0.48"/>
    <ellipse cx="18.2" cy="-6.3" rx="2.5" ry="4.2" fill="#b46a38" opacity="0.36"/>

    <!-- Asymmetric tied casing -->
    <path d="M -21,-3 Q -19,1 -21,5" fill="none" stroke="#2a1408" stroke-width="0.9" stroke-linecap="round" opacity="0.52"/>
    <ellipse cx="23" cy="4" rx="2.4" ry="3.5" fill="#1a0e08"/>
    <ellipse cx="22.5" cy="4" rx="1.45" ry="2.5" fill="#3a1e12"/>
    <rect x="20.2" y="-0.9" width="1.15" height="8" fill="#5a3a20" opacity="0.9"/>
    <rect x="22.6" y="0.2" width="0.9" height="6.2" fill="#c4a878" opacity="0.9"/>
    <circle cx="21.65" cy="1.6" r="1.15" fill="#c4a878" opacity="0.95"/>
    <circle cx="24.2" cy="2.8" r="1.15" fill="#5a3a20" opacity="0.85"/>
    <circle cx="24.2" cy="2.8" r="0.72" fill="#c4a878" opacity="0.76"/>
    <circle cx="21.85" cy="2.1" r="0.52" fill="#9c2018" opacity="0.95"/>
    <circle cx="21.95" cy="4.2" r="0.48" fill="#1f4628" opacity="0.95"/>
    <path d="M 22.6,1.6 Q 24.4,1.1 25.4,3.2" fill="none" stroke="#c4a878" stroke-width="0.7" stroke-linecap="round" opacity="0.8"/>

    <!-- Casing seams and glossy wrinkles -->
    <path d="M -18,2 Q -7,9 7,8" fill="none" stroke="#2a1408" stroke-width="0.9" stroke-linecap="round" opacity="0.55"/>
    <path d="M -14,-8 Q 0,-11 15,-5" fill="none" stroke="#2a1408" stroke-width="0.7" stroke-linecap="round" opacity="0.35"/>
    <path d="M -16,-5 Q -8,-8 2,-7" fill="none" stroke="#b46a38" stroke-width="0.8" stroke-linecap="round" opacity="0.38"/>

    <!-- Pale oat cutaway -->
    <path d="M -22.2,-5 Q -18.9,-8.4 -12.2,-6 Q -10.8,-3.2 -12.6,-0.6 Q -15.2,2.2 -20.7,1.2 Q -23.4,-1.4 -22.2,-5" fill="#2a1408" opacity="0.64"/>
    <path d="M -21.4,-4.55 Q -18.1,-7.95 -11.4,-5.55 Q -10,-2.75 -11.8,-0.15 Q -14.4,2.65 -19.9,1.65 Q -22.6,-0.95 -21.4,-4.55" fill="#f4d8a0"/>
    <path d="M -22.2,-5 Q -18.9,-8.4 -12.2,-6" fill="none" stroke="#2a1408" stroke-width="0.9" stroke-linecap="round" opacity="0.72"/>
    <path d="M -20.7,1.2 Q -15.8,2 -12.6,-0.6" fill="none" stroke="#b46a38" stroke-width="0.7" stroke-linecap="round" opacity="0.42"/>
    <circle cx="-18.8" cy="-4.4" r="0.95" fill="#d8b46a" opacity="0.95"/>
    <circle cx="-15.8" cy="-2.2" r="1.05" fill="#d8b46a" opacity="0.9"/>
    <circle cx="-12.8" cy="-5.1" r="0.85" fill="#d8b46a" opacity="0.82"/>
    <circle cx="-15.1" cy="-1" r="0.5" fill="#3a2a1a" opacity="0.45"/>

    <!-- Oat flecks in the casing -->
    <g fill="#d8b46a" opacity="0.72">
      <circle cx="-15" cy="-2" r="0.7"/>
      <circle cx="-11" cy="5" r="0.55"/>
      <circle cx="-4" cy="8" r="0.58"/>
      <circle cx="10" cy="4" r="0.62"/>
      <circle cx="15" cy="-3" r="0.52"/>
      <circle cx="6" cy="-8" r="0.48"/>
    </g>

    <!-- Big readable mascot eyes -->
    <circle cx="-7.2" cy="-2.2" r="4.2" fill="#1a0e08"/>
    <circle cx="8.3" cy="-2.2" r="4.2" fill="#1a0e08"/>
    <circle cx="-7.2" cy="-2.5" r="3.4" fill="#f0e6c8"/>
    <circle cx="8.3" cy="-2.5" r="3.4" fill="#f0e6c8"/>
    <circle cx="-5.8" cy="-2.6" r="1.45" fill="#0a0604"/>
    <circle cx="9.7" cy="-2.6" r="1.45" fill="#0a0604"/>
    <circle cx="-6.1" cy="-3.7" r="0.6" fill="#fff0c8" opacity="0.92"/>
    <circle cx="9.5" cy="-3.7" r="0.6" fill="#fff0c8" opacity="0.92"/>
    <path d="M -10.4,-4.4 Q -7.3,-5 -3.8,-4.7" fill="none" stroke="#1a0e08" stroke-width="0.48" stroke-linecap="round" opacity="0.32"/>
    <path d="M 4.1,-4.4 Q 8.4,-5 11.9,-4.7" fill="none" stroke="#1a0e08" stroke-width="0.48" stroke-linecap="round" opacity="0.32"/>
    <path d="M -2.5,3.2 Q 0,4.8 3.2,3.2" fill="none" stroke="#2a1408" stroke-width="0.8" stroke-linecap="round" opacity="0.55"/>
  </g>

  <!-- Vignette over everything -->
  <rect x="0" y="0" width="1200" height="630" fill="url(#vignette)" pointer-events="none"/>

  <!-- Hairline frame -->
  <rect x="6" y="6" width="1188" height="618" fill="none" stroke="#5a3a20" stroke-width="1"/>
</svg>
